    <style>
      body {
        margin: 0;
        background: #0F172A;
        color: #E2E8F0;
      }
      /* Loading screen trước khi React mount */
      #root:empty::after {
        content: "⚗️";
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 48px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0%   { transform: translate(-50%,-50%) rotate(0deg); }
        100% { transform: translate(-50%,-50%) rotate(360deg); }
      }
    </style>
